<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ExAO Web - Console Arduino</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eceff1; margin: 20px; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; border: 1px solid #ddd; }
        .group { border-right: 2px solid #ddd; padding-right: 15px; display: flex; align-items: center; gap: 8px; }
        button { padding: 8px 15px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        input { padding: 6px; border: 1px solid #ccc; border-radius: 4px; width: 100px; }
        label { font-size: 0.9em; font-weight: bold; }
        #status { font-size: 0.8em; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Interface ExAO v2.0</h1>
    
    <div class="toolbar">
        <div class="group">
            <button id="connect" style="background: #2ecc71; color: white;">🔌 Connexion</button>
            <button id="clear" style="background: #e74c3c; color: white;">Effacer</button>
        </div>

        <div class="group">
            <label>Axes :</label>
            <input type="text" id="labelX" placeholder="Temps (s)" value="Temps (s)">
            <input type="text" id="labelY" placeholder="Tension (V)" value="Tension (V)">
        </div>

        <div class="group">
            <label>Fréquence (ms) :</label>
            <input type="number" id="interval" value="100" min="10">
        </div>

        <div class="group">
            <label>Capteur :</label>
            <select id="sensorType">
                <option value="1">Tension (V)</option>
                <option value="100">Température (°C)</option>
                <option value="0.001">Pression (hPa)</option>
            </select>
        </div>

        <button id="export" style="background: #3498db; color: white;">💾 Export Regressi (CSV)</button>
    </div>

    <div id="status">Statut : Non connecté</div>
    <canvas id="mainChart" height="400"></canvas>
</div>

<script>
    let port, reader;
    let startTime = 0;
    const dataPoints = [];
    const timePoints = [];

    const ctx = document.getElementById('mainChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: timePoints,
            datasets: [{
                label: 'Mesure',
                data: dataPoints,
                borderColor: '#3498db',
                borderWidth: 2,
                pointRadius: 0,
                fill: false
            }]
        },
        options: {
            responsive: true,
            scales: {
                x: { title: { display: true, text: 'Temps (s)' } },
                y: { title: { display: true, text: 'Valeur' } }
            }
        }
    });

    // Mise à jour des labels en temps réel
    document.getElementById('labelX').oninput = (e) => chart.options.scales.x.title.text = e.target.value;
    document.getElementById('labelY').oninput = (e) => chart.options.scales.y.title.text = e.target.value;

    async function connect() {
        try {
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: 9600 });
            document.getElementById('status').innerText = "Statut : Connecté";
            startTime = Date.now();
            
            const textDecoder = new TextDecoderStream();
            port.readable.pipeTo(textDecoder.writable);
            reader = textDecoder.readable.getReader();

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                if (value) {
                    const rawVal = parseFloat(value.trim());
                    if (!isNaN(rawVal)) {
                        const factor = parseFloat(document.getElementById('sensorType').value);
                        const elapsed = (Date.now() - startTime) / 1000;
                        
                        dataPoints.push(rawVal * factor);
                        timePoints.push(elapsed.toFixed(2));

                        chart.update('none');
                    }
                }
            }
        } catch (err) {
            document.getElementById('status').innerText = "Erreur : " + err;
        }
    }

    // Export CSV compatible Regressi
    document.getElementById('export').onclick = () => {
        let csvContent = `${document.getElementById('labelX').value};${document.getElementById('labelY').value}\n`;
        for (let i = 0; i < dataPoints.length; i++) {
            csvContent += `${timePoints[i]};${dataPoints[i]}\n`.replace('.', ','); // Virgule pour Excel/Regressi FR
        }
        
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", "mesure_exao.csv");
        link.click();
    };

    document.getElementById('connect').onclick = connect;
    document.getElementById('clear').onclick = () => {
        dataPoints.length = 0;
        timePoints.length = 0;
        startTime = Date.now();
        chart.update();
    };
</script>

</body>
</html>
